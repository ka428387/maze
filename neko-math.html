<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐱 ねこ算数ランド</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap');

  :root {
    --cream: #FFF8F0;
    --warm-white: #FFFDF9;
    --cat-orange: #FF8C42;
    --cat-peach: #FFB347;
    --cat-light: #FFE4CC;
    --soft-brown: #C87941;
    --deep-brown: #7A4A1E;
    --lavender: #C8B4E8;
    --mint: #8ECFC9;
    --sunny: #FFD166;
    --coral: #FF6B6B;
    --sky: #74C0E4;
    --grass: #72C472;
    --text-dark: #3D2B1F;
    --shadow: rgba(120, 60, 20, 0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'M PLUS Rounded 1c', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* Paw print background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse 8px 6px at 20px 20px, rgba(200,150,100,0.08) 100%, transparent 100%),
      radial-gradient(circle 3px at 12px 10px, rgba(200,150,100,0.06) 100%, transparent 100%),
      radial-gradient(circle 3px at 28px 10px, rgba(200,150,100,0.06) 100%, transparent 100%);
    background-size: 80px 80px;
    pointer-events: none;
    z-index: 0;
  }

  /* ===== SCREENS ===== */
  .screen {
    display: none;
    min-height: 100vh;
    position: relative;
    z-index: 1;
    animation: fadeIn 0.4s ease;
  }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== HEADER ===== */
  .game-header {
    width: 100%;
    text-align: center;
    padding: 32px 20px 16px;
  }

  .game-title {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: clamp(2rem, 7vw, 3.2rem);
    font-weight: 900;
    color: var(--deep-brown);
    letter-spacing: 0.05em;
    line-height: 1.2;
    text-shadow: 3px 3px 0 var(--cat-light), 5px 5px 0 rgba(200,150,100,0.2);
  }

  .game-subtitle {
    font-size: 1rem;
    color: var(--soft-brown);
    margin-top: 6px;
    font-weight: 500;
  }

  /* ===== CAT ILLUSTRATIONS ===== */
  .cat-svg { display: inline-block; }

  /* Big hero cat */
  .hero-cat {
    width: 160px;
    height: 160px;
    margin: 12px auto;
    animation: bobble 3s ease-in-out infinite;
    filter: drop-shadow(4px 6px 8px rgba(120,60,20,0.18));
  }

  @keyframes bobble {
    0%, 100% { transform: translateY(0) rotate(-1deg); }
    50% { transform: translateY(-8px) rotate(1deg); }
  }

  /* Small decorative cats */
  .deco-cats {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin: 8px 0;
  }

  .deco-cat {
    width: 48px;
    opacity: 0.7;
    animation: deco-bounce 2.4s ease-in-out infinite;
  }
  .deco-cat:nth-child(2) { animation-delay: 0.4s; }
  .deco-cat:nth-child(3) { animation-delay: 0.8s; }

  @keyframes deco-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  /* ===== CARDS ===== */
  .card-row {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    justify-content: center;
    padding: 8px 20px 32px;
    width: 100%;
    max-width: 680px;
  }

  .card {
    background: var(--warm-white);
    border-radius: 24px;
    padding: 28px 32px;
    cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 4px 0 rgba(120,60,20,0.1), 0 8px 24px var(--shadow);
    border: 2.5px solid transparent;
    text-align: center;
    flex: 1;
    min-width: 200px;
    max-width: 280px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 6px;
    border-radius: 24px 24px 0 0;
  }

  .card-multiply::before { background: linear-gradient(90deg, var(--cat-orange), var(--cat-peach)); }
  .card-divide::before { background: linear-gradient(90deg, var(--lavender), var(--sky)); }

  .card:hover {
    transform: translateY(-6px);
    box-shadow: 0 10px 0 rgba(120,60,20,0.08), 0 16px 32px var(--shadow);
  }

  .card:active { transform: translateY(-2px); }

  .card-icon {
    font-size: 3rem;
    margin-bottom: 10px;
    display: block;
  }

  .card-title {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 1.5rem;
    font-weight: 900;
    color: var(--text-dark);
    margin-bottom: 6px;
  }

  .card-desc {
    font-size: 0.85rem;
    color: var(--soft-brown);
    line-height: 1.5;
  }

  /* ===== LEVEL CARDS ===== */
  .level-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    padding: 8px 20px 32px;
    width: 100%;
    max-width: 600px;
  }

  .level-card {
    background: var(--warm-white);
    border-radius: 18px;
    padding: 20px 12px;
    cursor: pointer;
    text-align: center;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    box-shadow: 0 3px 0 rgba(120,60,20,0.1), 0 6px 16px var(--shadow);
  }

  .level-card:hover {
    transform: translateY(-4px) scale(1.03);
    box-shadow: 0 8px 0 rgba(120,60,20,0.08), 0 12px 24px var(--shadow);
  }

  .level-card .star-row {
    font-size: 1.1rem;
    margin-bottom: 8px;
    display: block;
  }

  .level-card .level-num {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 1.2rem;
    font-weight: 900;
    color: var(--text-dark);
    margin-bottom: 4px;
  }

  .level-card .level-desc {
    font-size: 0.75rem;
    color: var(--soft-brown);
    line-height: 1.4;
  }

  /* Color accents by level */
  .lv1 { border-top: 5px solid var(--grass); }
  .lv2 { border-top: 5px solid var(--mint); }
  .lv3 { border-top: 5px solid var(--sunny); }
  .lv4 { border-top: 5px solid var(--cat-orange); }
  .lv5 { border-top: 5px solid var(--coral); }

  /* ===== SECTION TITLE ===== */
  .section-title {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 1.3rem;
    font-weight: 900;
    color: var(--text-dark);
    margin: 24px 0 4px;
    text-align: center;
  }

  .section-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--cat-light);
    color: var(--soft-brown);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.85rem;
    font-weight: 700;
    margin-bottom: 12px;
  }

  /* ===== BACK BUTTON ===== */
  .btn-back {
    background: none;
    border: 2px solid var(--cat-light);
    border-radius: 12px;
    padding: 8px 18px;
    color: var(--soft-brown);
    font-family: 'M PLUS Rounded 1c', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .btn-back:hover { background: var(--cat-light); }

  /* ===== GAME SCREEN ===== */
  .game-area {
    width: 100%;
    max-width: 560px;
    padding: 16px 20px 40px;
  }

  /* Progress bar */
  .progress-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
  }
  .progress-bar-bg {
    flex: 1;
    height: 12px;
    background: var(--cat-light);
    border-radius: 8px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--cat-orange), var(--cat-peach));
    border-radius: 8px;
    transition: width 0.4s ease;
  }
  .progress-label {
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--soft-brown);
    white-space: nowrap;
  }

  /* Score */
  .score-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .score-box {
    background: var(--warm-white);
    border-radius: 12px;
    padding: 6px 16px;
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--text-dark);
    box-shadow: 0 2px 8px var(--shadow);
  }
  .score-box span { color: var(--cat-orange); font-size: 1.1rem; }

  /* Cat reaction */
  .cat-reaction {
    width: 80px;
    height: 80px;
    margin: 0 auto 12px;
    transition: transform 0.2s;
  }

  /* Question card */
  .question-card {
    background: var(--warm-white);
    border-radius: 28px;
    padding: 36px 28px;
    text-align: center;
    box-shadow: 0 6px 0 rgba(120,60,20,0.09), 0 12px 32px var(--shadow);
    margin-bottom: 20px;
    position: relative;
    overflow: hidden;
  }

  .question-card::after {
    content: '🐾';
    position: absolute;
    bottom: -8px;
    right: 10px;
    font-size: 3rem;
    opacity: 0.06;
    transform: rotate(20deg);
  }

  .question-text {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: clamp(2rem, 9vw, 3.5rem);
    font-weight: 900;
    color: var(--text-dark);
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }

  .question-hint {
    font-size: 0.85rem;
    color: #aaa;
    margin-top: 6px;
  }

  /* Answer input */
  .answer-section {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  .answer-input {
    flex: 1;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    text-align: center;
    border: 3px solid var(--cat-light);
    border-radius: 16px;
    padding: 12px 16px;
    background: var(--cream);
    color: var(--text-dark);
    outline: none;
    transition: border-color 0.2s;
  }

  .answer-input:focus {
    border-color: var(--cat-orange);
    background: var(--warm-white);
  }

  .answer-input.correct { border-color: var(--grass); background: #f0fff0; }
  .answer-input.wrong { border-color: var(--coral); background: #fff0f0; animation: shake 0.4s ease; }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
  }

  .btn-submit {
    background: linear-gradient(135deg, var(--cat-orange), var(--cat-peach));
    border: none;
    border-radius: 16px;
    padding: 12px 24px;
    color: white;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 1.3rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--soft-brown);
    transition: transform 0.15s, box-shadow 0.15s;
    white-space: nowrap;
  }
  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 6px 0 var(--soft-brown); }
  .btn-submit:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--soft-brown); }

  /* Feedback toast */
  .feedback {
    text-align: center;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    min-height: 40px;
    transition: all 0.3s;
  }
  .feedback.correct { color: var(--grass); }
  .feedback.wrong { color: var(--coral); }

  /* Number pad for mobile feel */
  .numpad {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 12px;
  }
  .numpad-btn {
    background: var(--warm-white);
    border: 2px solid var(--cat-light);
    border-radius: 12px;
    padding: 14px 8px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 1.3rem;
    font-weight: 900;
    color: var(--text-dark);
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 2px 0 rgba(120,60,20,0.08);
  }
  .numpad-btn:hover { background: var(--cat-light); transform: translateY(-2px); }
  .numpad-btn:active { transform: translateY(1px); }
  .numpad-btn.clear { color: var(--coral); }
  .numpad-btn.submit-num { background: linear-gradient(135deg, var(--cat-orange), var(--cat-peach)); color: white; border-color: var(--cat-orange); }

  /* ===== RESULT SCREEN ===== */
  .result-box {
    background: var(--warm-white);
    border-radius: 28px;
    padding: 40px 32px;
    text-align: center;
    box-shadow: 0 8px 0 rgba(120,60,20,0.09), 0 16px 40px var(--shadow);
    max-width: 420px;
    width: calc(100% - 40px);
    margin: 20px auto;
  }

  .result-title {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    color: var(--text-dark);
    margin: 16px 0 8px;
  }

  .result-score {
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 3.5rem;
    font-weight: 900;
    color: var(--cat-orange);
    margin: 8px 0;
  }

  .result-stars {
    font-size: 2.2rem;
    margin: 8px 0 20px;
    letter-spacing: 4px;
  }

  .result-message {
    font-size: 1rem;
    color: var(--soft-brown);
    margin-bottom: 28px;
    line-height: 1.6;
  }

  .btn-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--cat-orange), var(--cat-peach));
    border: none;
    border-radius: 16px;
    padding: 14px 28px;
    color: white;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 1.1rem;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--soft-brown);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 0 var(--soft-brown); }
  .btn-primary:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--soft-brown); }

  .btn-secondary {
    background: var(--cream);
    border: 2px solid var(--cat-light);
    border-radius: 16px;
    padding: 12px 24px;
    color: var(--soft-brown);
    font-family: 'Zen Maru Gothic', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary:hover { background: var(--cat-light); }

  /* Confetti particles */
  .confetti-wrap {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    overflow: hidden;
  }
  .confetto {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    animation: fall linear forwards;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Floating emoji on correct answer */
  .float-up {
    position: fixed;
    font-size: 2.5rem;
    pointer-events: none;
    z-index: 99;
    animation: floatUp 1.2s ease forwards;
  }
  @keyframes floatUp {
    0% { transform: translateY(0) scale(0.5); opacity: 1; }
    100% { transform: translateY(-120px) scale(1.2); opacity: 0; }
  }

  /* Heart particles around cat */
  .heart-particle {
    position: absolute;
    pointer-events: none;
    z-index: 50;
    font-size: 1.4rem;
    animation: heartFloat var(--dur) ease forwards;
  }
  @keyframes heartFloat {
    0%   { transform: translate(0,0) scale(0.2) rotate(var(--rot0)); opacity: 1; }
    50%  { opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(1.0) rotate(var(--rot1)); opacity: 0; }
  }

  /* Cat wrapper needs relative pos for hearts */
  #cat-wrap {
    position: relative;
    display: inline-block;
    width: 80px;
    height: 80px;
  }

  /* Tear drops */
  .cat-tear {
    position: absolute;
    width: 5px;
    height: 8px;
    border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
    background: #74C0E4;
    opacity: 0;
    animation: tearDrop 1.2s ease-in forwards;
  }
  @keyframes tearDrop {
    0%   { opacity: 0.9; transform: translateY(0); }
    100% { opacity: 0;   transform: translateY(20px); }
  }

  @keyframes sadShake {
    0%, 100% { transform: rotate(0deg) translateY(0); }
    20%       { transform: rotate(-5deg) translateY(1px); }
    40%       { transform: rotate(5deg) translateY(1px); }
    60%       { transform: rotate(-4deg) translateY(0px); }
    80%       { transform: rotate(4deg) translateY(0px); }
  }

  /* Timer */
  .timer-bar-bg {
    width: 100%;
    height: 8px;
    background: var(--cat-light);
    border-radius: 6px;
    margin-top: 10px;
    overflow: hidden;
  }
  .timer-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--grass), var(--sunny));
    border-radius: 6px;
    transition: width 0.1s linear;
  }
  .timer-bar-fill.warn { background: linear-gradient(90deg, var(--cat-orange), var(--coral)); }

  /* Responsive */
  @media (max-width: 480px) {
    .card-row { gap: 12px; }
    .card { padding: 20px 16px; }
    .question-text { font-size: 2.2rem; }
    .answer-input { font-size: 1.6rem; }
  }
</style>
</head>
<body>

<!-- ===== TITLE SCREEN ===== -->
<div id="screen-title" class="screen active">
  <div class="game-header">
    <div class="game-title">🐱 ねこ算数ランド</div>
    <div class="game-subtitle">ねこといっしょに算数をたのしもう！</div>
  </div>

  <svg class="hero-cat" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
    <!-- Body -->
    <ellipse cx="80" cy="105" rx="45" ry="42" fill="#FFCBA4"/>
    <!-- Head -->
    <circle cx="80" cy="68" r="36" fill="#FFCBA4"/>
    <!-- Ear left -->
    <polygon points="44,42 56,18 68,46" fill="#FFCBA4"/>
    <polygon points="50,40 56,23 64,44" fill="#FFB0C8"/>
    <!-- Ear right -->
    <polygon points="92,46 104,18 116,42" fill="#FFCBA4"/>
    <polygon points="96,44 104,23 110,40" fill="#FFB0C8"/>
    <!-- Face -->
    <!-- Eyes -->
    <ellipse cx="67" cy="65" rx="7" ry="8" fill="#4A3728"/>
    <ellipse cx="93" cy="65" rx="7" ry="8" fill="#4A3728"/>
    <circle cx="69" cy="63" r="2.5" fill="white"/>
    <circle cx="95" cy="63" r="2.5" fill="white"/>
    <!-- Nose -->
    <ellipse cx="80" cy="76" rx="4" ry="3" fill="#FF9DB5"/>
    <!-- Mouth -->
    <path d="M76 79 Q80 84 84 79" stroke="#C87060" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Whiskers left -->
    <line x1="48" y1="74" x2="72" y2="77" stroke="#C87060" stroke-width="1.2" opacity="0.5"/>
    <line x1="46" y1="79" x2="72" y2="79" stroke="#C87060" stroke-width="1.2" opacity="0.5"/>
    <!-- Whiskers right -->
    <line x1="88" y1="77" x2="112" y2="74" stroke="#C87060" stroke-width="1.2" opacity="0.5"/>
    <line x1="88" y1="79" x2="114" y2="79" stroke="#C87060" stroke-width="1.2" opacity="0.5"/>
    <!-- Belly spot -->
    <ellipse cx="80" cy="110" rx="20" ry="18" fill="#FFE4D4"/>
    <!-- Paws -->
    <ellipse cx="55" cy="142" rx="14" ry="10" fill="#FFCBA4"/>
    <ellipse cx="105" cy="142" rx="14" ry="10" fill="#FFCBA4"/>
    <!-- Tail -->
    <path d="M122 115 Q150 100 148 130 Q146 148 130 145" stroke="#FFCBA4" stroke-width="14" fill="none" stroke-linecap="round"/>
    <!-- Collar -->
    <rect x="54" y="94" width="52" height="10" rx="5" fill="#FF8C42"/>
    <circle cx="80" cy="99" r="4" fill="#FFD166"/>
  </svg>

  <p class="section-title" style="margin-top:0;">コースをえらんでね！</p>

  <div class="card-row">
    <div class="card card-multiply" onclick="selectCourse('multiply')">
      <span class="card-icon">✖️</span>
      <div class="card-title">かけ算コース</div>
      <div class="card-desc">かけ算のれんしゅうをしよう！<br>1けたから大きいかずまで</div>
    </div>
    <div class="card card-divide" onclick="selectCourse('divide')">
      <span class="card-icon">➗</span>
      <div class="card-title">わり算コース</div>
      <div class="card-desc">わり算にチャレンジ！<br>かんたんから3けた➗2けたまで</div>
    </div>
  </div>

  <div class="deco-cats">
    <svg class="deco-cat" viewBox="0 0 48 48">
      <circle cx="24" cy="20" r="12" fill="#B8D4FF"/>
      <polygon points="14,12 18,2 22,14" fill="#B8D4FF"/>
      <polygon points="26,14 30,2 34,12" fill="#B8D4FF"/>
      <ellipse cx="20" cy="19" rx="2.5" ry="3" fill="#3D2B1F"/>
      <ellipse cx="28" cy="19" rx="2.5" ry="3" fill="#3D2B1F"/>
      <ellipse cx="24" cy="24" rx="2" ry="1.5" fill="#FFB0C8"/>
    </svg>

<script>
// ===== STATE =====
let currentCourse = 'multiply';
let currentLevel = 1;
let questions = [];
let currentQ = 0;
let score = 0;
let totalQ = 10;
let timerInterval = null;
let timeLeft = 30;
let maxTime = 30;
let answered = false;
let wrongCount = 0;

// ===== LEVEL CONFIGS =====
const LEVELS = {
  multiply: [
    { id: 1, name: 'レベル1', stars: '⭐', desc: '1けた×1けた', gen: () => mulGen(1,9, 1,9) },
    { id: 2, name: 'レベル2', stars: '⭐⭐', desc: '2けた×1けた', gen: () => mulGen(10,99, 2,9) },
    { id: 3, name: 'レベル3', stars: '⭐⭐⭐', desc: '2けた×2けた', gen: () => mulGen(10,99, 10,99) },
    { id: 4, name: 'レベル4', stars: '⭐⭐⭐⭐', desc: '3けた×1けた', gen: () => mulGen(100,999, 2,9) },
    { id: 5, name: 'レベル5', stars: '⭐⭐⭐⭐⭐', desc: '3けた×2けた', gen: () => mulGen(100,999, 10,99) },
  ],
  divide: [
    { id: 1, name: 'レベル1', stars: '⭐', desc: 'わりきれる÷1けた', gen: () => divGen(1,9) },
    { id: 2, name: 'レベル2', stars: '⭐⭐', desc: '2けた÷1けた', gen: () => divGenBig(10,99, 2,9) },
    { id: 3, name: 'レベル3', stars: '⭐⭐⭐', desc: '3けた÷1けた', gen: () => divGenBig(100,999, 2,9) },
    { id: 4, name: 'レベル4', stars: '⭐⭐⭐⭐', desc: '2けた÷2けた', gen: () => divGenBig(10,99, 10,99) },
    { id: 5, name: 'レベル5', stars: '⭐⭐⭐⭐⭐', desc: '3けた÷2けた', gen: () => divGenBig(100,999, 10,99) },
  ]
};

// ===== QUESTION GENERATORS =====
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

function mulGen(aMin, aMax, bMin, bMax) {
  const a = rand(aMin, aMax);
  const b = rand(bMin, bMax);
  return { display: `${a} × ${b} = ？`, answer: a * b, hint: '' };
}

function divGen(bMax) {
  // quotient * divisor = dividend
  const b = rand(2, bMax);
  const q = rand(1, 9);
  const a = b * q;
  return { display: `${a} ÷ ${b} = ？`, answer: q, hint: 'わりきれるよ' };
}

function divGenBig(aMin, aMax, bMin, bMax) {
  // Make sure b divides a evenly
  let tries = 0;
  while (tries < 50) {
    const b = rand(Math.max(bMin, 2), bMax);
    // pick answer between 1 and 99
    const q = rand(1, Math.min(99, Math.floor(aMax / b)));
    const a = b * q;
    if (a >= aMin && a <= aMax) {
      return { display: `${a} ÷ ${b} = ？`, answer: q, hint: 'わりきれるよ' };
    }
    tries++;
  }
  // fallback
  return divGen(9);
}

// ===== SCREEN MANAGEMENT =====
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  window.scrollTo(0, 0);
}

// ===== COURSE SELECTION =====
function selectCourse(course) {
  currentCourse = course;
  const title = course === 'multiply' ? '✖️ かけ算コース' : '➗ わり算コース';
  document.getElementById('level-course-title').textContent = title;
  buildLevelGrid();
  showScreen('level');
}

function buildLevelGrid() {
  const grid = document.getElementById('level-grid');
  grid.innerHTML = '';
  const levels = LEVELS[currentCourse];
  levels.forEach((lv, i) => {
    const card = document.createElement('div');
    card.className = `level-card lv${i + 1}`;
    card.innerHTML = `
      <span class="star-row">${lv.stars}</span>
      <div class="level-num">${lv.name}</div>
      <div class="level-desc">${lv.desc}</div>
    `;
    card.onclick = () => startGame(i);
    grid.appendChild(card);
  });
}

// ===== GAME =====
function startGame(levelIndex) {
  currentLevel = levelIndex;
  score = 0;
  currentQ = 0;
  wrongCount = 0;
  totalQ = 10;

  // Generate questions
  const levelConf = LEVELS[currentCourse][levelIndex];
  questions = [];
  for (let i = 0; i < totalQ; i++) questions.push(levelConf.gen());

  showScreen('game');
  setCatNeutral();
  showQuestion();
}

function showQuestion() {
  answered = false;
  const q = questions[currentQ];
  document.getElementById('question-display').textContent = q.display;
  document.getElementById('question-hint').textContent = q.hint || '';
  document.getElementById('q-num').textContent = currentQ + 1;
  document.getElementById('q-total').textContent = totalQ;
  document.getElementById('current-score').textContent = score;
  document.getElementById('answer-input').value = '';
  document.getElementById('answer-input').className = 'answer-input';
  document.getElementById('feedback-text').textContent = '';
  document.getElementById('feedback-text').className = 'feedback';

  // Progress
  document.getElementById('progress-fill').style.width = (currentQ / totalQ * 100) + '%';

  // Timer
  maxTime = getTimeLimit();
  resetTimer();
  document.getElementById('answer-input').focus();
}

function getTimeLimit() {
  const base = [30, 25, 22, 20, 18];
  return base[currentLevel] || 20;
}

function resetTimer() {
  clearInterval(timerInterval);
  timeLeft = maxTime;
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft -= 0.1;
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      if (!answered) timeUp();
    }
  }, 100);
}

function updateTimerDisplay() {
  const pct = Math.max(0, timeLeft / maxTime * 100);
  const fill = document.getElementById('timer-fill');
  fill.style.width = pct + '%';
  fill.className = 'timer-bar-fill' + (timeLeft < maxTime * 0.3 ? ' warn' : '');
  document.getElementById('timer-label').textContent = '⏱ ' + Math.ceil(timeLeft);
}

function timeUp() {
  answered = true;
  wrongCount++;
  showFeedback(false, '⏰ じかんぎれ！こたえは ' + questions[currentQ].answer);
  setCatSad();
  setTimeout(nextQuestion, 2000);
}

function submitAnswer() {
  if (answered) return;
  const val = parseInt(document.getElementById('answer-input').value);
  if (isNaN(val)) {
    document.getElementById('answer-input').style.borderColor = '#aaa';
    document.getElementById('answer-input').focus();
    return;
  }
  checkAnswer(val);
}

function checkAnswer(val) {
  answered = true;
  clearInterval(timerInterval);
  const correct = questions[currentQ].answer;

  if (val === correct) {
    score++;
    soundCorrect();
    document.getElementById('answer-input').classList.add('correct');
    showFeedback(true, getCorrectMsg());
    setCatHappy();
    document.getElementById('current-score').textContent = score;
    setTimeout(nextQuestion, 1200);
  } else {
    wrongCount++;
    soundWrong();
    document.getElementById('answer-input').classList.add('wrong');
    showFeedback(false, `✗ ざんねん… こたえは ${correct} だよ`);
    setCatSad();
    setTimeout(nextQuestion, 2200);
  }
}

function showFeedback(ok, msg) {
  const el = document.getElementById('feedback-text');
  el.textContent = msg;
  el.className = 'feedback ' + (ok ? 'correct' : 'wrong');
}

function nextQuestion() {
  currentQ++;
  if (currentQ >= totalQ) {
    showResult();
  } else {
    setCatNeutral();
    showQuestion();
  }
}

// ===== CAT EXPRESSIONS =====
function setCatHappy() {
  // Big smile, squinty happy eyes
  document.getElementById('cat-mouth').setAttribute('d', 'M34 42 Q40 50 46 42');
  document.getElementById('cat-eye-l').setAttribute('rx', '5');
  document.getElementById('cat-eye-l').setAttribute('ry', '1.8');
  document.getElementById('cat-eye-r').setAttribute('rx', '5');
  document.getElementById('cat-eye-r').setAttribute('ry', '1.8');
  const cat = document.getElementById('game-cat');
  cat.style.animation = 'none';
  void cat.offsetWidth;
  cat.style.animation = 'bobble 0.35s ease-in-out 4';
  // Spawn hearts around cat
  spawnHearts();
}

function setCatSad() {
  // Sad droopy mouth, teary tilted eyes, ω shape
  document.getElementById('cat-mouth').setAttribute('d', 'M36 46 Q40 41 44 46');
  // Tilted sad eyes (drawn as arcs pointing down at outer edge)
  document.getElementById('cat-eye-l').setAttribute('rx', '4.5');
  document.getElementById('cat-eye-l').setAttribute('ry', '4');
  document.getElementById('cat-eye-r').setAttribute('rx', '4.5');
  document.getElementById('cat-eye-r').setAttribute('ry', '4');
  // Sad wobble
  const cat = document.getElementById('game-cat');
  cat.style.animation = 'none';
  void cat.offsetWidth;
  cat.style.animation = 'sadShake 0.5s ease 2';
  // Tears
  spawnTears();
}

function setCatNeutral() {
  document.getElementById('cat-mouth').setAttribute('d', 'M37 42 Q40 46 43 42');
  document.getElementById('cat-eye-l').setAttribute('rx', '4');
  document.getElementById('cat-eye-l').setAttribute('ry', '4.5');
  document.getElementById('cat-eye-r').setAttribute('rx', '4');
  document.getElementById('cat-eye-r').setAttribute('ry', '4.5');
  const cat = document.getElementById('game-cat');
  cat.style.animation = '';
  // Remove tears
  document.querySelectorAll('.cat-tear').forEach(t => t.remove());
}

function spawnHearts() {
  const wrap = document.getElementById('cat-wrap');
  // Remove old ones
  wrap.querySelectorAll('.heart-particle').forEach(h => h.remove());
  const angles = [290, 320, 350, 20, 50, 80, 110, 240];
  const emojis = ['💕','❤️','💖','💗','💓','💝'];
  angles.forEach((angle, i) => {
    const h = document.createElement('div');
    h.className = 'heart-particle';
    h.textContent = emojis[i % emojis.length];
    const rad = (angle * Math.PI) / 180;
    const dist = 55 + Math.random() * 25;
    const tx = Math.cos(rad) * dist;
    const ty = Math.sin(rad) * dist;
    const dur = (0.7 + Math.random() * 0.5).toFixed(2) + 's';
    const rot0 = (Math.random() * 40 - 20).toFixed(0) + 'deg';
    const rot1 = (Math.random() * 80 - 40).toFixed(0) + 'deg';
    h.style.cssText = `
      left: 50%; top: 50%;
      margin-left: -12px; margin-top: -12px;
      --tx: ${tx}px; --ty: ${ty}px;
      --dur: ${dur};
      --rot0: ${rot0}; --rot1: ${rot1};
      animation-delay: ${(i * 0.06).toFixed(2)}s;
    `;
    wrap.appendChild(h);
    setTimeout(() => h.remove(), 1500);
  });
}

function spawnTears() {
  const wrap = document.getElementById('cat-wrap');
  wrap.querySelectorAll('.cat-tear').forEach(t => t.remove());
  // Left tear
  const tl = document.createElement('div');
  tl.className = 'cat-tear';
  tl.style.cssText = 'left:20px; top:36px; animation-delay:0.1s;';
  // Right tear
  const tr = document.createElement('div');
  tr.className = 'cat-tear';
  tr.style.cssText = 'left:54px; top:36px; animation-delay:0.25s;';
  wrap.appendChild(tl);
  wrap.appendChild(tr);
  setTimeout(() => { tl.remove(); tr.remove(); }, 1600);
}

// ===== RESULT =====
function showResult() {
  clearInterval(timerInterval);
  const pct = score / totalQ;

  // Stars
  let stars, title, message;
  if (pct === 1) {
    stars = '⭐⭐⭐'; title = 'かんぺき！🎉'; message = `${totalQ}もんぜんぶせいかい！\nねこもよろこんでいるよ！ にゃー！`;
    setTimeout(launchConfetti, 100);
    setResultCatHappy();
  } else if (pct >= 0.7) {
    stars = '⭐⭐'; title = 'よくできました！'; message = `${score}/${totalQ}もんせいかい！\nもうすこしでかんぺき！`;
    setResultCatHappy();
  } else if (pct >= 0.4) {
    stars = '⭐'; title = 'がんばったね！'; message = `${score}/${totalQ}もんせいかい。\nもういちどちょうせんしてみよう！`;
    setResultCatNeutral();
  } else {
    stars = ''; title = 'またちょうせん！'; message = `${score}/${totalQ}もんせいかい。\nれんしゅうしてまたきてね！`;
    setResultCatSad();
  }

  document.getElementById('result-title').textContent = title;
  document.getElementById('result-score').textContent = `${score} / ${totalQ}`;
  document.getElementById('result-stars').textContent = stars || '🐾';
  document.getElementById('result-message').textContent = message;

  showScreen('result');
}

function setResultCatHappy() {
  document.getElementById('r-mouth').setAttribute('d', 'M54 65 Q60 72 66 65');
  document.getElementById('r-eye-l').setAttribute('ry', '3');
  document.getElementById('r-eye-r').setAttribute('ry', '3');
}
function setResultCatNeutral() {
  document.getElementById('r-mouth').setAttribute('d', 'M55 63 Q60 70 65 63');
  document.getElementById('r-eye-l').setAttribute('ry', '7');
  document.getElementById('r-eye-r').setAttribute('ry', '7');
}
function setResultCatSad() {
  document.getElementById('r-mouth').setAttribute('d', 'M55 68 Q60 63 65 68');
  document.getElementById('r-eye-l').setAttribute('ry', '7');
  document.getElementById('r-eye-r').setAttribute('ry', '7');
}

function retryGame() { startGame(currentLevel); }

// ===== NUMPAD =====
function numpadInput(val) {
  const inp = document.getElementById('answer-input');
  if (answered) return;
  if (val === 'clear') {
    inp.value = inp.value.toString().slice(0, -1);
  } else if (val === 'reset') {
    inp.value = '';
  } else {
    const cur = inp.value.toString();
    if (cur.length >= 5) return;
    inp.value = cur + val;
  }
}

// ===== KEYBOARD =====
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') submitAnswer();
});

// ===== EFFECTS =====
function spawnFloat(emoji, nearEl) {
  const el = document.createElement('div');
  el.className = 'float-up';
  el.textContent = emoji;
  const rect = nearEl.getBoundingClientRect();
  el.style.left = (rect.left + rect.width / 2 - 20) + 'px';
  el.style.top = (rect.top - 10) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1300);
}

function launchConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  const colors = ['#FF8C42','#FFD166','#72C472','#74C0E4','#C8B4E8','#FF6B6B','#FFB347'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetto';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-20px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (6 + Math.random() * 8) + 'px';
    el.style.height = (6 + Math.random() * 8) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    el.style.animationDelay = (Math.random() * 0.8) + 's';
    wrap.appendChild(el);
  }
  setTimeout(() => wrap.innerHTML = '', 4000);
}

// ===== SOUND ENGINE (Web Audio API) =====
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playTone(freq, type, duration, volume = 0.18, delay = 0) {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime + delay);
  gain.gain.setValueAtTime(0, ctx.currentTime + delay);
  gain.gain.linearRampToValueAtTime(volume, ctx.currentTime + delay + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + delay + duration);
  osc.start(ctx.currentTime + delay);
  osc.stop(ctx.currentTime + delay + duration + 0.02);
}

// 正解：明るいぴこぴこ上昇音
function soundCorrect() {
  playTone(523, 'square', 0.08, 0.15, 0.00);  // C5
  playTone(659, 'square', 0.08, 0.15, 0.08);  // E5
  playTone(784, 'square', 0.10, 0.18, 0.16);  // G5
  playTone(1047,'square', 0.14, 0.20, 0.25);  // C6
}

// まちがい：ぼよん下降音
function soundWrong() {
  playTone(300, 'square', 0.10, 0.15, 0.00);
  playTone(220, 'square', 0.12, 0.15, 0.10);
  playTone(180, 'square', 0.15, 0.12, 0.22);
}
